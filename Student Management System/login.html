<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Management System - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Site Header -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <h1>School Management System</h1>
      </div>

      <!-- Navigation Bar -->
      <nav class="nav" aria-label="Primary navigation">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="about.html">About</a>
        <a class="nav-link" href="contact.html">Contact</a>
        <a class="nav-link nav-link-active" href="login.html" aria-current="page">Login</a>
        <a class="nav-link" href="register.html">Register</a>
        <a class="nav-link" href="dashboard.html">Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page">
      <div class="page-header">
        <h2 class="page-title">Login</h2>
        <p class="muted">Enter your username and password to continue.</p>
      </div>

      <!-- Login Form -->
      <form class="form" action="#" method="post" autocomplete="on">
        <div class="form-group">
          <label for="login-username">Username <span aria-hidden="true">*</span></label>
          <input
            id="login-username"
            name="username"
            type="text"
            class="input"
            placeholder="e.g. admin"
            required
            minlength="3"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="login-password">Password <span aria-hidden="true">*</span></label>
          <input
            id="login-password"
            name="password"
            type="password"
            class="input"
            placeholder="Your password"
            required
            minlength="6"
            autocomplete="current-password"
          />
        </div>

        <button class="btn btn-primary" type="submit">Login</button>

        <p class="form-foot">
          New here? <a href="register.html" class="link">Register</a>
        </p>

        <p class="note note-soft">
          <strong>Demo:</strong> This form is frontend-only.
        </p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© School Management System 2026</p>
    </div>
  </footer>
</body>
</html>
